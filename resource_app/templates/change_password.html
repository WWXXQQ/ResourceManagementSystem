{% extends 'base.html' %}

{% block content %}
<h1>修改个人密码</h1>

<div class="glass-panel" style="max-width: 500px; margin: 2rem auto;">
    <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;">安全设置</h2>
    <form method="post" action="{% url 'change_password' %}">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label class="form-label">{{ field.label }} *</label>
            <input type="password" 
                   name="{{ field.name }}" 
                   class="form-control" 
                   required />
            {% if field.errors %}
            <div style="color: var(--danger-color); font-size: 0.85rem; margin-top: 0.5rem;">
                {{ field.errors|join:", " }}
            </div>
            {% endif %}
            {% if field.help_text %}
            <div style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.4rem; line-height: 1.4;">
                {{ field.help_text|safe }}
            </div>
            {% endif %}
        </div>
        {% endfor %}
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">确认修改</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="flex: 1; text-align: center; display: inline-flex; align-items: center; justify-content: center; text-decoration: none;">返回首页</a>
        </div>
    </form>
</div>
{% endblock %}
